name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run test suite
        run: cd backend && npm run test:backend
        env:
          NODE_ENV: test

  test-frontend:
    name: Frontend Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit/integration tests
        run: cd frontend && npm run test

  deploy:
    name: Trigger Production Deployments
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render.com Auto-Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          echo "Triggering Render.com backend deployment..."
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Trigger Vercel Deployment via CLI
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        if: env.VERCEL_TOKEN != ''
        run: |
          echo "Triggering Vercel production deployment..."
          npm install --global vercel
          vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}" --yes --cwd frontend
